<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Sharing Extension - Authentication</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.6/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.6/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.6/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="authContainer" class="container mx-auto p-4 max-w-md">
        <h1 class="text-2xl font-bold mb-4">Link Sharing Extension</h1>
        <div id="signInButton" class="hidden">
            <button onclick="signIn()" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition duration-200">
                Sign in with Google
            </button>
        </div>
        <div id="addFriendsForm" class="hidden">
            <h2 class="text-xl font-semibold mb-2">Add Friends</h2>
            <p class="mb-2">Your email: <span id="userEmail"></span></p>
            <input type="email" id="friendEmail" placeholder="Enter friend's email" class="w-full p-2 mb-2 border rounded">
            <button onclick="addFriend()" class="bg-green-500 text-white py-2 px-4 rounded hover:bg-green-600 transition duration-200">
                Add Friend
            </button>
            <ul id="friendList" class="mt-4"></ul>
            <button onclick="finishSetup()" class="mt-4 bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition duration-200">
                Finish Setup
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDdIjG8XTEYfq2eht4193fvlxFp481ZrHQ",
            authDomain: "link-share-ext.firebaseapp.com",
            projectId: "link-share-ext",
            storageBucket: "link-share-ext.appspot.com",
            messagingSenderId: "309540318772",
            appId: "1:309540318772:web:366f2b36a81e0dc750e461"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;

        function showSignInButton() {
            document.getElementById('signInButton').style.display = 'block';
            document.getElementById('addFriendsForm').style.display = 'none';
        }

        function showAddFriendsForm() {
            document.getElementById('signInButton').style.display = 'none';
            document.getElementById('addFriendsForm').style.display = 'block';
            document.getElementById('userEmail').textContent = currentUser.email;
        }

        function signIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    currentUser = result.user;
                    showAddFriendsForm();
                })
                .catch((error) => {
                    console.error("Error during sign-in:", error);
                });
        }

        function addFriend() {
            const friendEmail = document.getElementById('friendEmail').value;
            if (friendEmail && currentUser) {
                db.collection('users').doc(currentUser.uid).update({
                    friends: firebase.firestore.FieldValue.arrayUnion(friendEmail)
                }).then(() => {
                    const li = document.createElement('li');
                    li.textContent = friendEmail;
                    document.getElementById('friendList').appendChild(li);
                    document.getElementById('friendEmail').value = '';
                }).catch((error) => {
                    console.error("Error adding friend:", error);
                });
            }
        }

        function finishSetup() {
            if (currentUser) {
                chrome.runtime.sendMessage({
                    type: 'AUTH_COMPLETE',
                    user: {
                        uid: currentUser.uid,
                        email: currentUser.email,
                        displayName: currentUser.displayName
                    }
                });
                window.close();
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                showAddFriendsForm();
            } else {
                showSignInButton();
            }
        });
    </script>
</body>
</html>
